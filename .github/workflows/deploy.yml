name: CI/CD Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  # CONTINUOUS INTEGRATION (CI)
  ci-backend:
    name: Backend Integration (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev python3-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Run Backend Tests
        env:
          SECRET_KEY: 'test-secret-key-for-ci-pipeline'
          DEBUG: 'True'
        run: |
          cd backend
          python manage.py test

  ci-frontend:
    name: Frontend Integration (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend Application
        run: |
          cd frontend
          npm run build

  # CONTINUOUS DEPLOYMENT (CD)

  deploy-backend:
    name: Deploy Backend (CD)
    needs: [ci-backend, ci-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "Triggering Render deployment webhook..."
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        shell: bash

  deploy-frontend:
    name: Deploy Frontend (CD)
    needs: [ci-backend, ci-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend for Production
        env:
          VITE_API_URL: 'https://portfolio-backend.onrender.com' # Production URL
        run: |
          cd frontend
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
