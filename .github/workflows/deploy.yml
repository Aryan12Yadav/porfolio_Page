name: CI/CD Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Django Backend to Render
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-group: '3.10'
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev python3-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Run Backend Tests
        env:
          SECRET_KEY: 'test-secret-key-for-ci-pipeline'
          DEBUG: 'True'
        run: |
          cd backend
          python manage.py test

      - name: Trigger Render Deploy Hook
        if: success()
        run: |
          echo "Triggering Render deployment webhook..."
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        shell: bash

  deploy-frontend:
    name: Deploy React Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend Application
        env:
          VITE_API_URL: 'https://portfolio-backend.onrender.com' # Points to Render backend URL in production
        run: |
          cd frontend
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
